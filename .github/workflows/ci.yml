name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt
        run: |
          diff <(gofmt -l .) <(echo -n "")

      - name: Test
        run: go test -race -cover ./...

  # Auto-releases every push to main that lands real (non-docs) changes:
  # bumps semver from the commit subjects since the last tag, tags it, and
  # publishes a GitHub Release. `go get` resolves modules by tag, so this is
  # what keeps the package installable at a real version without a manual
  # tag-and-release step.
  release:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi

          if git rev-parse "$latest" >/dev/null 2>&1; then
            changed=$(git diff --name-only "$latest"..HEAD)
            log=$(git log "$latest"..HEAD --pretty=%s)
          else
            changed=$(git ls-files)
            log=$(git log --pretty=%s)
          fi

          # Skip if there's nothing to release, or only docs changed.
          if [ -z "$changed" ] || ! printf '%s\n' "$changed" | grep -qvE '\.md$|^LICENSE$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No release-worthy changes since $latest — skipping."
            exit 0
          fi

          major=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+)$/\1/')
          minor=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+)$/\2/')
          patch=$(echo "$latest" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+)$/\3/')

          if printf '%s\n' "$log" | grep -qiE '^(BREAKING CHANGE|major:)'; then
            major=$((major + 1)); minor=0; patch=0
          elif printf '%s\n' "$log" | grep -qiE '^feat(\(|:)'; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          next="v${major}.${minor}.${patch}"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Releasing $next (previous: $latest)"

      - name: Tag and publish release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          next="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$next" -m "$next"
          git push origin "$next"
          gh release create "$next" --title "$next" --generate-notes
